version: '3'

silent: true
 
tasks:
  default:
    cmds:
      - task: deploy:curie

  deploy:* :
    desc: Deploy to a specific target
    vars:
      TARGET: '{{index .MATCH 0}}'
      TARGET_HOST: '{{.TARGET_HOST| default .TARGET}}'
      HOSTNAME:
        sh: "hostname"
      ALLOWED_TARGETS: # Dynamically get allowed targets to use in precondition
        sh: "nix flake show --json 2>/dev/null | jq -r '.nixosConfigurations | keys[]'"
      NIX_REBUILD_CMD: nixos-rebuild switch --flake .#{{.TARGET}} --no-reexec
    preconditions:
      - sh: echo '{{.ALLOWED_TARGETS}}' | grep -q '^{{.TARGET}}$'
        msg: "Target [{{.TARGET}}] is not in the list of allowed targets: [{{.ALLOWED_TARGETS}}]"
    cmds:
      - echo "    🚀 Deploying flake .#{{.TARGET}} to host {{.TARGET_HOST}}..."
      - cmd: sudo {{.NIX_REBUILD_CMD}}
        if: '{{eq .TARGET_HOST .HOSTNAME}}'
      - cmd: '{{.NIX_REBUILD_CMD}} --target-host "{{.TARGET_HOST}}" --build-host "{{.TARGET_HOST}}" --sudo'
        if: '{{ne .TARGET_HOST .HOSTNAME}}'
      - cmd: echo "🎉 Deployment to {{.TARGET_HOST}} completed successfully! 🎉"
  
  deploy:all:
    desc: Deploy to all targets
    deps:
      - for: [curie, ada, leguin]
        task: deploy:{{.ITEM}}

  update:
    desc: Full system update
    prompt: This will update *everything* in your systems. Do you want to continue?
    cmds:
      - nix flake update

  clean:
    desc: Remove older generations and unused packages
    cmds:
      # Delete all generations older than 7 days
      - sudo nix profile wipe-history --older-than 7d --profile /nix/var/nix/profiles/system
      # Garbage collect unused packages
      - sudo nix-collect-garbage --delete-old
      # Optional: Clean home-manager generations
      - nix-collect-garbage --delete-old
    
  upgrade:
    desc: Update and deploy all targets
    output: 'prefixed'
    deps:
      - update
    cmds:
      - task: deploy:all

  kwin_restart:
    desc: Restart KWin && Plasma
    cmds:
      - kwin_wayland --replace &
      - systemctl --user restart plasma-plasmashell

  reset_display:
    desc: Reset saved display/output config so KWin re-detects the preferred mode
    cmds:
      - rm -f ~/.config/kwinoutputconfig.json
      - echo "Removed kwinoutputconfig.json — log out/in (or run 'task kwin_restart') to re-detect."
  
  rekey_secrets:
    desc: Rekey secrets with agenix (in the private nixos-secrets repo)
    cmds:
      - cd ../nixos-secrets && agenix -r && git commit -am "rekey" && git push
      - nix flake update secrets

  add_ada_vpn:
    desc: Add the current Wireguard peer config to the VPN
    requires:
      vars:
        - name: USER_ON_TARGET_HOST
        - name: TARGET_HOST_IP_USER_ACCESSIBLE
    cmds:
      - ssh {{.USER_ON_TARGET_HOST}}@{{.TARGET_HOST_IP_USER_ACCESSIBLE}} "nmcli connection import type wireguard file /var/run/agenix/ada_vpn_curie.conf"

  new_install:
    desc: Fresh install on a new machine
    requires:
      vars:
        - name: USER_ON_TARGET_HOST
        - name: TARGET_HOST_IP_USER_ACCESSIBLE
        - name: CONFIG_NAME
        - name: SKIP_ACTUAL_INSTALL
          enum: [y,n]
    cmds:
      - cmd: "nix run github:nix-community/nixos-anywhere -- {{.USER_ON_TARGET_HOST}}@{{.TARGET_HOST_IP_USER_ACCESSIBLE}} --flake .#{{.CONFIG_NAME}} --print-build-logs"
        if: '[ "{{.SKIP_ACTUAL_INSTALL}}" != "y" ]'
      - read -p "Wait for boot into new config, then hit enter to get the hardware configuration" -r;
      - ssh {{.USER_ON_TARGET_HOST}}@{{.TARGET_HOST_IP_USER_ACCESSIBLE}} "sudo nixos-generate-config --show-hardware-config" > ./hosts/{{.CONFIG_NAME}}/hardware-configuration.nix
      - read -p "Adjusted filesystem entries from ./hosts/{{.CONFIG_NAME}}/hardware-configuration.nix , then hit enter for the ssh key" -r;
      - ssh {{.USER_ON_TARGET_HOST}}@{{.TARGET_HOST_IP_USER_ACCESSIBLE}} 'cat /etc/ssh/ssh_host_ed25519_key.pub'
      - read -p "Hit enter after you added the above SSH host key to pubkeys_attrset.nix in the private nixos-secrets repo " -r;
      - task: rekey_secrets
      - task: deploy:{{.CONFIG_NAME}}
        vars: { TARGET_HOST: "{{.TARGET_HOST_IP_USER_ACCESSIBLE}}" }
      - task: add_ada_vpn
        vars: 
          TARGET_HOST_IP_USER_ACCESSIBLE: "{{.TARGET_HOST_IP_USER_ACCESSIBLE}}"
          USER_ON_TARGET_HOST: "{{.USER_ON_TARGET_HOST}}"
