title: Dashboard
theme: "dark"
refresh: "5m"

# Defaults are used when nothing is defined at the slot level. They can be overridden by defining rules directly on a slot.
defaults:
  rules:
    - match:
        code: "^0|2\\d\\d$"
      status: { id: ok, label: "✅" }
    - match: {}
      status: { id: error, label: "❌" }

# YAML anchors: reusable fragments ilias doesn't interpret directly... 
# it's all just yaml
_anchors:
  pct_rules: &pct_rules           # works for disk, memory, CPU …
    - match:
        output: "^[0-6]\\d%$|^[0-9]%$"
      status: { id: ok, label: "✅ <70%" }
    - match:
        output: "^[7-8]\\d%$"
      status: { id: warn, label: "⚠️ 70–89%" }
    - match: {}
      status: { id: critical, label: "🔴 ≥90%" }

groups:
  - name: Media
    tiles:
      - name: Navidrome
        icon: assets/navidrome.png
        link: https://music.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://music.micasaestu.casa"

      - name: Fetching
        icon: assets/fetching.svg
        link: https://fetching.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://fetching.micasaestu.casa"

  - name: Infrastructure
    tiles:
      - name: Prometheus
        icon: assets/prometheus.svg
        link: https://micasaestu.casa:9090/

      - name: TailScale
        icon: assets/tailscale.svg
        link: https://login.tailscale.com/admin/machines
        slots:
          - name: "ada"
            check: "tailscale status --json | jq -e '.Self.Online'"
          - name: "curie"
            check: "tailscale status --json | jq -e '[.Peer[] | select(.HostName == \"curie\")] | first | .Online'"

      - name: Nginx
        icon: assets/nginx.svg
        slots:
          - name: "active"
            check: "systemctl is-active nginx"

      - name: TLS cert
        icon: assets/tls-cert.png
        slots:
          - name: "expiry"
            check: "openssl s_client -connect micasaestu.casa:443 -servername micasaestu.casa </dev/null 2>/dev/null | openssl x509 -noout -checkend 604800"
            rules:
              - match:
                  code: 0
                status: { id: "ok", label: "✅ valid 7d+" }
              - match: {}
                status: { id: "error", label: "🔴 expires soon!" }
      - name: Disk space (/data/Music)
        icon: assets/disk_free.png
        slots:
          - name: "usage"
            check: "df /data/Music --output=pcent | tail -1 | tr -d ' '"
            rules: *pct_rules


  - name: Systemd
    tiles:
      - name: Navidrome service
        icon: assets/systemd.svg
        slots:
          - name: "active"
            check: "systemctl is-active navidrome"

      - name: Fetching service
        icon: assets/systemd.svg
        slots:
          - name: "active"
            check: "systemctl is-active fetching"

  - name: Metrics
    tiles:
      - name: "CPU Usage"
        banner:
          src: "/tmp/ilias_cpu.png"
          type: image
        generate:
          command: "prometheus-render --query 'sum(rate(node_cpu_seconds_total{mode!=\"idle\"}[5m])) * 100' --range 24h --title 'CPU %' --output /tmp/ilias_cpu.png"
          timeout: "30s"

      - name: "Memory Usage"
        banner:
          src: "/tmp/ilias_memory.png"
          type: image
        generate:
          command: "prometheus-render --query '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100' --range 24h --title 'Memory %' --output /tmp/ilias_memory.png"
          timeout: "30s"

      - name: "Disk I/O"
        banner:
          src: "/tmp/ilias_diskio.png"
          type: image
        generate:
          command: "prometheus-render --query 'rate(node_disk_read_bytes_total[5m]) + rate(node_disk_written_bytes_total[5m])' --range 24h --title 'Disk I/O (bytes/s)' --output /tmp/ilias_diskio.png"
          timeout: "30s"

      - name: "Network Traffic"
        banner:
          src: "/tmp/ilias_network.png"
          type: image
        generate:
          command: "prometheus-render --query 'rate(node_network_receive_bytes_total{device!=\"lo\"}[5m])' --range 24h --title 'Network RX (bytes/s)' --output /tmp/ilias_network.png"
          timeout: "30s"