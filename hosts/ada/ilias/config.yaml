title: Welcome to Ada
theme: "dark"
refresh: "5m"

# Defaults are used when nothing is defined at the slot level. They can be overridden by defining rules directly on a slot.
defaults:
  rules:
    - match:
        code: "^0|2\\d\\d$"
      status: { id: ok, label: "✅" }
    - match: {}
      status: { id: error, label: "❌" }

# YAML anchors: reusable fragments ilias doesn't interpret directly... 
# it's all just yaml
_anchors:
  pct_rules: &pct_rules           # works for disk, memory, CPU …
    - match:
        output: "^[0-6]\\d%$|^[0-9]%$"
      status: { id: ok, label: "✅ <70%" }
    - match:
        output: "^[7-8]\\d%$"
      status: { id: warn, label: "⚠️ 70–89%" }
    - match: {}
      status: { id: critical, label: "🔴 ≥90%" }

groups:
  - name: Media
    tiles:
      - name: Music (Navidrome)
        icon: assets/navidrome.png
        link: https://music.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://music.micasaestu.casa"

      - name: Video (Jellyfin)
        icon: assets/jellyfin.svg
        link: https://video.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://video.micasaestu.casa"
      
      - name: Requests (Jellyseerr)
        icon: assets/jellyseerr.svg
        link: https://jellyseerr.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://jellyseerr.micasaestu.casa"

      - name: Fetching
        icon: assets/fetching.svg
        link: https://fetching.micasaestu.casa
        slots:
          - name: "healthy"
            check: "https://fetching.micasaestu.casa"

  - name: Infrastructure
    tiles:
      - name: TLS cert
        icon: assets/tls-cert.png
        slots:
          - name: "expiry"
            check: "openssl s_client -connect micasaestu.casa:443 -servername micasaestu.casa </dev/null 2>/dev/null | openssl x509 -noout -checkend 604800"
            rules:
              - match:
                  code: 0
                status: { id: "ok", label: "✅ valid 7d+" }
              - match: {}
                status: { id: "error", label: "🔴 expires soon!" }

  - name: Systemd
    tiles:
      - name: Navidrome service
        icon: assets/systemd.svg
        slots:
          - name: "active"
            check: "systemctl is-active navidrome"

      - name: Fetching service
        icon: assets/systemd.svg
        slots:
          - name: "active"
            check: "systemctl is-active fetching"

  - name: Metrics
    tiles:
      - name: "CPU Usage"
        link: "https://prometheus.micasaestu.casa/graph?g0.expr=sum(rate(node_cpu_seconds_total%7Bmode!%3D%22idle%22%7D%5B5m%5D))%20*%20100&g0.tab=0&g0.range_input=24h"
        banner:
          src: "/tmp/ilias_cpu.svg"
          type: image
        generate:
          command: >-
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query 'sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])) * 100' 
            --range 24h 
            --title 'CPU %' 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_cpu.svg
            --smooth
          timeout: "30s"

      - name: "Memory Usage"
        link: "https://prometheus.micasaestu.casa/graph?g0.expr=(1%20-%20node_memory_MemAvailable_bytes%20%2F%20node_memory_MemTotal_bytes)%20*%20100&g0.tab=0&g0.range_input=24h"
        banner:
          src: "/tmp/ilias_memory.svg"
          type: image
        generate:
          command: >- 
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100' 
            --range 24h 
            --title 'Memory %' 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_memory.svg
            --smooth
          timeout: "30s"

      - name: "Disk I/O"
        link: "https://prometheus.micasaestu.casa/graph?g0.expr=rate(node_disk_io_time_seconds_total%5B5m%5D)&g0.tab=0&g0.range_input=24h"
        banner:
          src: "/tmp/ilias_diskio.svg"
          type: image
        generate:
          command: >-
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query 'rate(node_disk_io_time_seconds_total[5m])' 
            --range 24h 
            --title 'Disk I/O (s/s)' 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_diskio.svg
            --smooth
          timeout: "30s"

      - name: "Network Traffic"
        link: "https://prometheus.micasaestu.casa/graph?g0.expr=rate(node_network_receive_bytes_total%7Bdevice!%3D%22lo%22%7D%5B5m%5D)&g0.tab=0&g0.range_input=24h"
        banner:
          src: "/tmp/ilias_network.svg"
          type: image
        generate:
          command: >-
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query 'rate(node_network_receive_bytes_total{device!="lo"}[5m])' 
            --range 24h 
            --title 'Network RX (bytes/s)' 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_network.svg
            --smooth
          timeout: "30s"
      - name: "Disk Usage (Root)"
        banner:
          src: "/tmp/ilias_disk.svg"
          type: "image"
        generate:
          command: >-
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query '100 * (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})'
            --range 24h --title "Disk % Used/Free" 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_disk.svg 
            --smooth
          timeout: "30s"
      - name: "Disk Usage (Music)"
        banner:
          src: "/tmp/ilias_disk_music.svg"
          type: "image"
        generate:
          command: >-
            prometheus-render 
            --url https://prometheus.micasaestu.casa
            --query '100 * (1 - node_filesystem_avail_bytes{mountpoint="/data"} / node_filesystem_size_bytes{mountpoint="/data"})'
            --range 24h --title "Music % Used/Free" 
            --vlines-query 'nixos_system_version' 
            --output /tmp/ilias_disk_music.svg 
            --smooth
          timeout: "30s"
        slots:
          - name: "usage"
            check: "df /data/Music --output=pcent | tail -1 | tr -d ' '"
            rules: *pct_rules


